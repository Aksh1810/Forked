name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Real engine for wrapper tests, run at a tiny node budget.
      # The production engine version is pinned in the worker Dockerfile;
      # see docs/engine-versioning.md.
      - run: sudo apt-get update && sudo apt-get install -y stockfish
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # Validates the pinned Stockfish download and that the worker image's
  # engine binary actually runs. Local Docker is not required for development
  # of phases 0 and 1, so CI is where this is proven.
  worker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f packages/worker/Dockerfile -t forked-worker .
      - run: docker run --rm forked-worker sh -c "echo uci | stockfish | grep -m1 'id name'"
      # The Lambda variant of the same image: engine still runs, and the
      # handler module the runtime interface client loads actually resolves.
      - run: docker build -f packages/worker/Dockerfile.lambda -t forked-worker-lambda .
      - run: docker run --rm --entrypoint sh forked-worker-lambda -c "echo uci | stockfish | grep -m1 'id name'"
      - run: docker run --rm --entrypoint node forked-worker-lambda -e "import('./packages/worker/dist/lambda.js').then(m => { if (typeof m.handler !== 'function' || typeof m.dlqHandler !== 'function') { console.error('handler exports missing'); process.exit(1) } console.log('lambda handlers ok') })"
