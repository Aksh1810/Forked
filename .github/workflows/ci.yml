name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Real engine for wrapper tests, run at a tiny node budget.
      # The production engine version is pinned in the worker Dockerfile;
      # see docs/engine-versioning.md.
      - run: sudo apt-get update && sudo apt-get install -y stockfish
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
