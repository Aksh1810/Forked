# Local development stack. Scale workers with:
#   docker compose up -d --build --scale worker=4
services:
  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    init: true
    stop_grace_period: 45s
    environment:
      TABLE_NAME: blunderfarm
      QUEUE_NAME: analysis-tasks
      DLQ_NAME: analysis-tasks-dlq
      SQS_ENDPOINT: http://elasticmq:9324
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      VISIBILITY_SEC: ${VISIBILITY_SEC:-180}
      HEARTBEAT_SEC: ${HEARTBEAT_SEC:-60}
      GRACE_MS: ${GRACE_MS:-30000}
    depends_on:
      - elasticmq
      - dynamodb

  dlq-consumer:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    init: true
    environment:
      WORKER_MODE: dlq
      TABLE_NAME: blunderfarm
      QUEUE_NAME: analysis-tasks
      DLQ_NAME: analysis-tasks-dlq
      SQS_ENDPOINT: http://elasticmq:9324
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      - elasticmq
      - dynamodb
  elasticmq:
    image: softwaremill/elasticmq-native
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./compose/elasticmq.conf:/opt/elasticmq.conf

  dynamodb:
    image: amazon/dynamodb-local
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8000:8000"
